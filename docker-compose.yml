version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: multiagent-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass redis_password
    restart: unless-stopped
    networks:
      - multiagent-network



networks:
  multiagent-network:
    driver: bridge
